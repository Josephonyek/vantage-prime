<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Prime | Powered by AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="bg-[#F8FAFC] text-slate-900 font-sans selection:bg-blue-500 selection:text-white">

    <!-- Loader -->
    <div id="loader" class="fixed inset-0 bg-[#0F172A] z-[1000] flex flex-col items-center justify-center transition-all duration-700">
        <div class="relative flex items-center justify-center mb-8">
            <div class="absolute w-24 h-24 border-[3px] border-blue-500/10 rounded-full"></div>
            <div class="absolute w-24 h-24 border-[3px] border-t-blue-500 rounded-full animate-spin"></div>
            <span class="text-white font-black text-4xl italic tracking-tighter">V</span>
        </div>
        <p id="loader-msg" class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.5em] animate-pulse">Determining your role...</p>
    </div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-72 bg-[#0F172A] hidden lg:flex flex-col p-8 sticky top-0 h-screen text-white border-r border-white/5">
            <div class="mb-12">
                <h1 class="text-2xl font-black text-blue-500 italic">VANTAGE<span class="text-white not-italic font-light">PRIME</span></h1>
            </div>
            <nav class="space-y-4 flex-1" id="sidebar-nav"></nav>
            <button onclick="logout()" class="p-4 text-slate-500 hover:text-white font-bold text-[10px] uppercase tracking-widest transition-colors">Terminate Session</button>
        </aside>

        <main class="flex-1 p-6 lg:p-12 max-w-7xl mx-auto w-full">
            <header class="flex justify-between items-start mb-12">
                <div>
                    <h2 id="userName" class="text-4xl font-black text-slate-900 tracking-tight">Welcome</h2>
                    <div id="roleBadge" class="inline-flex items-center gap-2 mt-2 px-3 py-1 bg-slate-100 text-slate-500 text-[10px] font-black rounded-lg uppercase tracking-widest border border-slate-200">
                        <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span>
                        Loading role...
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="bg-white shadow-2xl shadow-blue-900/10 rounded-[2.5rem] px-10 py-5 border border-slate-100">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Available Funds</p>
                        <h3 id="balance" class="text-3xl font-black text-slate-900">₦0.00</h3>
                    </div>
                    <button onclick="document.getElementById('pay-modal').style.display='flex'" class="bg-blue-600 text-white w-16 h-16 rounded-3xl font-black shadow-xl hover:scale-110 transition-all text-2xl">+</button>
                </div>
            </header>

            <!-- Role-based Content -->
            <div id="admin-content" class="hidden mb-12">
                <a href="admin.html" class="block bg-gradient-to-br from-slate-900 to-indigo-950 p-10 rounded-[3.5rem] shadow-2xl">
                    <h3 class="text-white text-4xl font-black italic">Control Center</h3>
                    <p class="text-slate-400 mt-3">Admin tools: manage users, products & inventory</p>
                </a>
            </div>

            <div id="seller-content" class="hidden mb-12 bg-white rounded-[3rem] p-10">
                <h3 class="text-2xl font-black mb-6">Seller Dashboard</h3>
                <p class="text-slate-600">Manage your products and track sales here.</p>
                <!-- Add your seller features later -->
            </div>

            <!-- Marketplace (visible to everyone) -->
            <section>
                <div class="flex items-center gap-4 mb-8">
                    <h3 class="text-xl font-black text-slate-800 italic">Marketplace</h3>
                    <div class="h-[1px] flex-1 bg-slate-200/60"></div>
                </div>
                <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
            </section>
        </main>
    </div>

    <!-- Pay Modal -->
    <div id="pay-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md hidden z-[1100] items-center justify-center p-4">
        <div class="bg-white p-12 rounded-[4rem] w-full max-w-md text-center shadow-2xl">
            <h3 class="text-3xl font-black mb-2">Add Capital</h3>
            <div class="relative mb-8">
                <span class="absolute left-6 top-1/2 -translate-y-1/2 font-black text-slate-400 text-xl">₦</span>
                <input type="number" id="amt" placeholder="0.00" class="w-full p-8 pl-12 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] text-center font-black text-4xl outline-none">
            </div>
            <button onclick="pay()" class="w-full bg-blue-600 text-white py-7 rounded-[2.5rem] font-black text-xl">Secure Payment</button>
            <button onclick="this.parentElement.parentElement.style.display='none'" class="mt-8 text-slate-400 text-sm">Cancel</button>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://qdoqkqzidpuchynuzkaz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkb3FrcXppZHB1Y2h5bnV6a2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODMyNzEsImV4cCI6MjA5MjA1OTI3MX0.NzXuTJd2384npxTNzdYGoNo9CcQDHqlwkUM-pV2xlV0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        async function boot() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                location.href = 'login.html';
                return;
            }

            currentUser = session.user;
            const firstName = (currentUser.user_metadata?.full_name || currentUser.email || "User").split(' ')[0];
            document.getElementById('userName').innerText = `Hello, ${firstName} 👋`;

            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 400);

            await syncProfileData();
            loadProducts();
            listenForProfileChanges();
        }

        async function syncProfileData() {
            const { data: p } = await _supabase.from('profiles').select('role, wallet_balance').eq('id', currentUser.id).single();
            if (!p) return;

            document.getElementById('balance').innerText = `₦${(p.wallet_balance || 0).toLocaleString()}`;

            const role = p.role || 'customer';
            updateRoleUI(role);
        }

        function updateRoleUI(role) {
            const badge = document.getElementById('roleBadge');
            document.getElementById('admin-content').classList.add('hidden');
            document.getElementById('seller-content').classList.add('hidden');

            if (role === 'admin') {
                badge.textContent = "ADMIN ACCESS";
                badge.classList.add('bg-red-50', 'text-red-600');
                document.getElementById('admin-content').classList.remove('hidden');
            } else if (role === 'seller') {
                badge.textContent = "SELLER ACCOUNT";
                document.getElementById('seller-content').classList.remove('hidden');
            } else {
                badge.textContent = "CUSTOMER";
            }
        }

        function listenForProfileChanges() {
            _supabase.channel('profile-sync')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles', filter: `id=eq.${currentUser.id}` }, 
                    (payload) => {
                        if (payload.new.wallet_balance !== undefined) {
                            document.getElementById('balance').innerText = `₦${payload.new.wallet_balance.toLocaleString()}`;
                        }
                        if (payload.new.role) updateRoleUI(payload.new.role);
                    })
                .subscribe();
        }

        async function loadProducts() {
            const { data } = await _supabase.from('products').select('*').eq('is_approved', true).limit(8);
            const grid = document.getElementById('grid');
            if (data) {
                grid.innerHTML = data.map(item => `
                    <div class="bg-white p-5 rounded-[3rem] border border-slate-100 hover:shadow-2xl transition-all">
                        <img src="${item.image_url}" class="w-full aspect-square object-cover rounded-3xl mb-4">
                        <h5 class="font-bold text-sm truncate">${item.name}</h5>
                        <p class="text-blue-600 font-black">₦${item.price.toLocaleString()}</p>
                    </div>
                `).join('');
            }
        }

        window.pay = () => {
            const amt = document.getElementById('amt').value;
            if (!amt) return;
            const handler = PaystackPop.setup({
                key: 'pk_test_77e96f0549cd29e76ce2117f8adf00a5a96658ea',
                email: currentUser.email,
                amount: amt * 100,
                callback: () => document.getElementById('pay-modal').style.display = 'none'
            });
            handler.openIframe();
        };

        window.logout = () => {
            _supabase.auth.signOut().then(() => location.href = 'login.html');
        };

        boot();
    </script>
</body>
                </html>
