<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Prime | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="bg-[#F8FAFC] text-slate-900 font-sans">

    <div id="boot-loader" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-black text-slate-400 animate-pulse tracking-widest">BOOTING VANTAGE OS...</p>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-72 bg-[#0F172A] hidden lg:flex flex-col p-8 sticky top-0 h-screen text-white">
            <h1 class="text-2xl font-black text-blue-500 mb-10">VANTAGE</h1>
            <nav class="space-y-2 flex-1">
                <button class="w-full text-left p-4 rounded-2xl bg-blue-600 font-bold">🏠 Dashboard</button>
                <button class="w-full text-left p-4 rounded-2xl hover:bg-slate-800 text-slate-400 font-bold">📦 My Orders</button>
                <a href="admin.html" id="side-admin-link" class="hidden w-full flex items-center gap-3 p-4 rounded-2xl bg-red-500/10 text-red-400 border border-red-500/20 font-bold mt-10">
                    🛡️ Admin Panel
                </a>
            </nav>
            <button onclick="localStorage.clear(); location.href='login.html'" class="p-4 text-slate-500 font-bold">Sign Out</button>
        </aside>

        <main class="flex-1 p-6 lg:p-10">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="userName" class="text-3xl font-black">Welcome</h2>
                    <div id="roleBadge" class="inline-block mt-1 px-3 py-1 bg-blue-100 text-blue-600 text-[10px] font-black rounded-full uppercase tracking-widest">User</div>
                </div>
                <div class="flex gap-4">
                    <div class="bg-white p-4 rounded-3xl border shadow-sm text-right">
                        <p class="text-[10px] font-bold text-slate-400">WALLET</p>
                        <h3 id="balanceDisplay" class="text-xl font-black">₦0.00</h3>
                    </div>
                    <button onclick="document.getElementById('pay-modal').classList.remove('hidden')" class="bg-blue-600 text-white px-6 rounded-3xl font-black">Fund</button>
                </div>
            </header>

            <div id="admin-gate-card" class="hidden mb-10 bg-gradient-to-r from-slate-900 to-indigo-900 p-8 rounded-[3rem] shadow-2xl border-b-4 border-blue-500 cursor-pointer" onclick="location.href='admin.html'">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-white text-2xl font-black">System Control Center</h3>
                        <p class="text-blue-300 text-sm">Approve goods, manage sellers, and view audit logs.</p>
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl text-white text-2xl">⚡</div>
                </div>
            </div>

            <section>
                <h3 class="text-xl font-black mb-6">Verified Marketplace</h3>
                <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    </div>
            </section>
        </main>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-[150] flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center">
            <h3 class="text-2xl font-black mb-6">Add Funds</h3>
            <input type="number" id="fund-amount" placeholder="Amount (₦)" class="w-full p-5 bg-slate-50 border rounded-2xl mb-6 text-center text-xl font-bold">
            <button onclick="startPaystack()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black">Pay Now</button>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="mt-4 text-slate-400 text-xs">Cancel</button>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://qdoqkqzidpuchynuzkaz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkb3FrcXppZHB1Y2h5bnV6a2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODMyNzEsImV4cCI6MjA5MjA1OTI3MX0.NzXuTJd2384npxTNzdYGoNo9CcQDHqlwkUM-pV2xlV0';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        async function bootSystem() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if(!user) { window.location.href = 'login.html'; return; }

                const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                currentUser = { ...user, ...profile };

                // UI Updates
                document.getElementById('userName').innerText = `Hello, ${profile.full_name.split(' ')[0]}`;
                document.getElementById('roleBadge').innerText = profile.role;
                document.getElementById('balanceDisplay').innerText = `₦${profile.wallet_balance.toLocaleString()}`;

                // ADMIN CHECK: If user is admin, show the secret links
                if(profile.role === 'admin') {
                    document.getElementById('side-admin-link').classList.remove('hidden');
                    document.getElementById('admin-gate-card').classList.remove('hidden');
                }

                await loadGallery();
                
                // Hide loader
                document.getElementById('boot-loader').style.display = 'none';

            } catch (err) {
                console.error("Boot Error:", err);
                alert("Connection failed. Check your internet.");
            }
        }

        async function loadGallery() {
            const { data } = await _supabase.from('products').select('*').eq('is_approved', true);
            const grid = document.getElementById('product-grid');
            if(!data || data.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-10 text-slate-400">Market is empty.</p>';
                return;
            }
            grid.innerHTML = data.map(item => `
                <div class="bg-white p-3 rounded-[2rem] border shadow-sm">
                    <img src="${item.image_url}" class="w-full h-32 object-cover rounded-[1.5rem] mb-3">
                    <h5 class="font-bold text-xs px-2 truncate">${item.name}</h5>
                    <p class="text-blue-600 font-black text-sm px-2 mb-2">₦${item.price.toLocaleString()}</p>
                    <button class="w-full bg-slate-900 text-white py-2 rounded-xl text-[10px] font-bold">BUY</button>
                </div>
            `).join('');
        }

        window.startPaystack = () => {
            const amount = document.getElementById('fund-amount').value;
            const handler = PaystackPop.setup({
                key: 'pk_test_77e96f0549cd29e76ce2117f8adf00a5a96658ea',
                email: currentUser.email,
                amount: amount * 100,
                onClose: () => alert('Window closed.'),
                callback: (res) => alert('Payment Success! Ref: ' + res.reference)
            });
            handler.openIframe();
        };

        // Start everything
        bootSystem();
    </script>
</body>
        </html>
