<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Prime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js" async></script> </head>
<body class="bg-[#F8FAFC] text-slate-900 overflow-x-hidden">

    <div id="loader" class="fixed inset-0 bg-[#0F172A] z-[500] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <h1 class="text-white mt-4 font-black tracking-widest text-xs">VANTAGE PRIME</h1>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#0F172A] hidden lg:flex flex-col p-6 sticky top-0 h-screen text-white">
            <div class="mb-10 px-2">
                <h1 class="text-xl font-black text-blue-500">VANTAGE</h1>
            </div>
            <nav class="space-y-1 flex-1">
                <a href="#" class="block p-4 rounded-2xl bg-blue-600 font-bold text-sm">🏪 Marketplace</a>
                <a href="#" class="block p-4 rounded-2xl hover:bg-slate-800 text-slate-400 font-bold text-sm">📦 My Orders</a>
                <a href="admin.html" id="admin-nav" class="hidden p-4 rounded-2xl bg-red-500/10 text-red-400 border border-red-500/20 font-bold text-sm mt-8">🛡️ Admin Panel</a>
            </nav>
            <button onclick="logout()" class="p-4 text-slate-500 text-xs font-bold uppercase">Sign Out</button>
        </aside>

        <main class="flex-1 p-4 lg:p-10">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="userName" class="text-2xl font-black text-slate-900 italic">Welcome Back</h2>
                    <span id="roleLabel" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Searching...</span>
                </div>
                <div class="flex items-center gap-3 bg-white p-2 pl-6 rounded-full shadow-sm border border-slate-100">
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 leading-none">WALLET</p>
                        <h3 id="wallet" class="text-lg font-black text-slate-900">₦0.00</h3>
                    </div>
                    <button onclick="document.getElementById('pay-modal').style.display='flex'" class="bg-blue-600 text-white w-10 h-10 rounded-full font-black shadow-lg shadow-blue-200">+</button>
                </div>
            </header>

            <div id="admin-banner" class="hidden mb-8 group relative overflow-hidden bg-slate-900 rounded-[2.5rem] p-8 cursor-pointer" onclick="location.href='admin.html'">
                <div class="relative z-10 flex justify-between items-center">
                    <div>
                        <p class="text-blue-400 text-[10px] font-black uppercase mb-1">Secure Management</p>
                        <h3 class="text-white text-2xl font-black">Admin Control Center</h3>
                    </div>
                    <div class="text-white text-3xl">→</div>
                </div>
                <div class="absolute inset-0 bg-gradient-to-r from-blue-600/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </div>

            <h3 class="text-sm font-black text-slate-400 uppercase mb-4 px-2">Global Inventory</h3>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                </div>
        </main>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-[600] items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl text-center">
            <h3 class="text-2xl font-black mb-2">Fund Account</h3>
            <input type="number" id="amt" placeholder="₦ Amount" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-4 text-center text-xl font-black outline-none focus:border-blue-500">
            <button onclick="payNow()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl">Pay with Paystack</button>
            <button onclick="this.parentElement.parentElement.style.display='none'" class="mt-4 text-slate-400 text-xs font-bold">CLOSE</button>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://qdoqkqzidpuchynuzkaz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkb3FrcXppZHB1Y2h5bnV6a2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODMyNzEsImV4cCI6MjA5MjA1OTI3MX0.NzXuTJd2384npxTNzdYGoNo9CcQDHqlwkUM-pV2xlV0';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let myData = null;

        // FAST LOAD FUNCTION
        async function load() {
            // Step 1: Start both requests at the SAME TIME (Parallel)
            const [authRes, prodRes] = await Promise.all([
                _supabase.auth.getUser(),
                _supabase.from('products').select('*').eq('is_approved', true).limit(10)
            ]);

            if (!authRes.data.user) { location.href = 'login.html'; return; }

            // Step 2: Get Profile immediately
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', authRes.data.user.id).single();
            myData = { ...authRes.data.user, ...profile };

            // Update UI
            document.getElementById('userName').innerText = `Hey, ${profile.full_name.split(' ')[0]}`;
            document.getElementById('roleLabel').innerText = profile.role;
            document.getElementById('wallet').innerText = `₦${profile.wallet_balance.toLocaleString()}`;

            // Reveal Admin Section if role matches
            if(profile.role === 'admin') {
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('admin-banner').classList.remove('hidden');
            }

            // Render Products
            const grid = document.getElementById('grid');
            grid.innerHTML = prodRes.data.map(i => `
                <div class="bg-white p-3 rounded-3xl border border-slate-100 hover:shadow-lg transition-all cursor-pointer">
                    <img src="${i.image_url}" class="w-full h-28 object-cover rounded-2xl mb-3">
                    <h4 class="font-bold text-[11px] truncate px-1">${i.name}</h4>
                    <p class="text-blue-600 font-black text-sm px-1">₦${i.price.toLocaleString()}</p>
                </div>
            `).join('');

            // Fade out loader
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        }

        window.payNow = () => {
            const amount = document.getElementById('amt').value;
            if(!amount) return;
            const handler = PaystackPop.setup({
                key: 'pk_test_77e96f0549cd29e76ce2117f8adf00a5a96658ea',
                email: myData.email,
                amount: amount * 100,
                callback: () => location.reload()
            });
            handler.openIframe();
        };

        window.logout = () => { _supabase.auth.signOut(); location.href='login.html'; };

        load();
    </script>
</body>
                    </html>
