<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage | High Speed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="bg-[#F8FAFC] text-slate-900 font-sans">

    <div id="loader" class="fixed inset-0 bg-[#0F172A] z-[999] flex flex-col items-center justify-center transition-all duration-500">
        <div class="relative flex items-center justify-center mb-6">
            <div class="absolute w-20 h-20 border-2 border-blue-500/10 rounded-full"></div>
            <div class="absolute w-20 h-20 border-2 border-t-blue-500 rounded-full animate-spin"></div>
            <span class="text-white font-black text-2xl italic">V</span>
        </div>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em]">Optimizing Identity...</p>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-72 bg-[#0F172A] hidden lg:flex flex-col p-8 sticky top-0 h-screen text-white">
            <h1 class="text-2xl font-black text-blue-500 mb-12 italic">VANTAGE</h1>
            <nav class="space-y-3 flex-1">
                <button class="w-full text-left p-4 rounded-2xl bg-blue-600 font-bold">🏠 Home</button>
                <a href="admin.html" id="side-admin" class="hidden w-full flex items-center gap-3 p-4 rounded-2xl bg-red-500/10 text-red-400 border border-red-500/20 font-bold">🛡️ Admin Portal</a>
            </nav>
            <button onclick="logout()" class="p-4 text-slate-500 font-bold text-xs uppercase">Sign Out</button>
        </aside>

        <main class="flex-1 p-6 lg:p-12">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="userName" class="text-3xl font-black tracking-tight italic">...</h2>
                    <p id="userRole" class="text-blue-600 font-black text-[9px] uppercase tracking-widest mt-1 opacity-70">Securing Access</p>
                </div>
                <div class="bg-white shadow-xl shadow-blue-900/5 rounded-[2rem] px-8 py-4 border border-slate-100 flex items-center gap-6">
                    <div>
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Balance</p>
                        <h3 id="balance" class="text-2xl font-black text-slate-900">₦0.00</h3>
                    </div>
                    <button onclick="document.getElementById('pay-modal').style.display='flex'" class="bg-blue-600 text-white w-10 h-10 rounded-xl font-black shadow-lg">+</button>
                </div>
            </header>

            <div id="control-center-box" class="hidden mb-10">
                <a href="admin.html" class="block bg-gradient-to-r from-slate-900 to-indigo-950 p-10 rounded-[3rem] shadow-2xl relative overflow-hidden border-b-4 border-blue-500">
                    <div class="relative z-10">
                        <h3 class="text-white text-3xl font-black italic">Control Center</h3>
                        <p class="text-slate-400 text-sm mt-1">Manage system data & verify pending goods.</p>
                    </div>
                    <div class="absolute right-10 top-1/2 -translate-y-1/2 text-4xl opacity-20">🛡️</div>
                </a>
            </div>

            <section>
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-6 px-2">Market Inventory</h3>
                <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <div class="h-56 bg-slate-100 rounded-[2.5rem] animate-pulse"></div>
                    <div class="h-56 bg-slate-100 rounded-[2.5rem] animate-pulse"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm hidden z-[1000] items-center justify-center p-4">
        <div class="bg-white p-12 rounded-[3.5rem] w-full max-w-sm text-center">
            <h3 class="text-2xl font-black mb-6 italic">Fund Vault</h3>
            <input type="number" id="amt" placeholder="₦ 0.00" class="w-full p-6 bg-slate-50 border-2 rounded-3xl mb-6 text-center font-black text-3xl outline-none focus:border-blue-500">
            <button onclick="pay()" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-xl shadow-xl shadow-blue-500/20">Authorize</button>
            <button onclick="this.parentElement.parentElement.style.display='none'" class="mt-4 text-slate-400 text-[10px] font-black uppercase tracking-widest">Close</button>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://qdoqkqzidpuchynuzkaz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkb3FrcXppZHB1Y2h5bnV6a2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODMyNzEsImV4cCI6MjA5MjA1OTI3MX0.NzXuTJd2384npxTNzdYGoNo9CcQDHqlwkUM-pV2xlV0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userSession = null;

        async function init() {
            // 1. Instant Cache Check
            const cachedRole = localStorage.getItem('vantage_role');
            if(cachedRole === 'admin') showAdminUI();

            const { data: { session } } = await _supabase.auth.getSession();
            if(!session) { location.href = 'login.html'; return; }
            userSession = session;

            // Display name immediately from session
            document.getElementById('userName').innerText = `Hello, ${session.user.user_metadata.full_name.split(' ')[0]}`;

            // 2. Load Data
            await syncAll();
            
            // 3. Close Loader
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        }

        async function syncAll() {
            const [pRes, gRes] = await Promise.all([
                _supabase.from('profiles').select('*').eq('id', userSession.user.id).single(),
                _supabase.from('products').select('*').eq('is_approved', true).limit(8)
            ]);

            if(pRes.data) {
                const u = pRes.data;
                document.getElementById('balance').innerText = `₦${u.wallet_balance.toLocaleString()}`;
                document.getElementById('userRole').innerText = u.role.toUpperCase() + " ACCOUNT";
                
                // Cache role for next load
                localStorage.setItem('vantage_role', u.role);
                if(u.role === 'admin') showAdminUI();
            }

            if(gRes.data) {
                document.getElementById('grid').innerHTML = gRes.data.map(i => `
                    <div class="bg-white p-4 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <img src="${i.image_url}" class="w-full h-32 object-cover rounded-[1.8rem] mb-3">
                        <h5 class="font-bold text-[10px] text-slate-500 uppercase px-2 truncate">${i.name}</h5>
                        <p class="text-blue-600 font-black text-sm px-2">₦${i.price.toLocaleString()}</p>
                    </div>
                `).join('');
            }
        }

        function showAdminUI() {
            document.getElementById('control-center-box').classList.remove('hidden');
            document.getElementById('side-admin').classList.remove('hidden');
        }

        window.pay = () => {
            const amount = document.getElementById('amt').value;
            const handler = PaystackPop.setup({
                key: 'pk_test_77e96f0549cd29e76ce2117f8adf00a5a96658ea',
                email: userSession.user.email,
                amount: amount * 100,
                callback: () => {
                    document.getElementById('pay-modal').style.display = 'none';
                    // MANUAL POLL: Check balance every 2 seconds for 10 seconds to ensure it updates
                    let checkCount = 0;
                    const poller = setInterval(async () => {
                        const { data } = await _supabase.from('profiles').select('wallet_balance').eq('id', userSession.user.id).single();
                        document.getElementById('balance').innerText = `₦${data.wallet_balance.toLocaleString()}`;
                        checkCount++;
                        if(checkCount > 5) clearInterval(poller);
                    }, 2000);
                }
            });
            handler.openIframe();
        };

        window.logout = () => { localStorage.clear(); _supabase.auth.signOut(); location.href='login.html'; };

        init();
    </script>
</body>
    </html>
