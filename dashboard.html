<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage | Ultimate Speed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] text-slate-900 overflow-x-hidden">

    <div id="loader" class="fixed inset-0 bg-[#0F172A] z-[999] flex flex-col items-center justify-center transition-all duration-500">
        <div class="relative flex items-center justify-center">
            <div class="absolute w-20 h-20 border-4 border-blue-500/10 rounded-full"></div>
            <div class="absolute w-20 h-20 border-4 border-t-blue-500 rounded-full animate-spin"></div>
            <span class="text-white font-black text-2xl italic">V</span>
        </div>
        <div class="mt-8 overflow-hidden w-48 h-[2px] bg-slate-800 rounded-full">
            <div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-[3000ms]"></div>
        </div>
        <p id="loader-status" class="mt-4 text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">Authenticating...</p>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#0F172A] hidden lg:flex flex-col p-8 sticky top-0 h-screen text-white">
            <h1 class="text-xl font-black text-blue-500 mb-10">VANTAGE</h1>
            <nav class="space-y-4 flex-1">
                <button class="w-full text-left p-3 rounded-xl bg-blue-600 font-bold text-sm">Dashboard</button>
                <a href="admin.html" id="side-admin" class="hidden p-3 rounded-xl bg-red-500/10 text-red-400 border border-red-500/20 font-bold text-sm block">Admin Portal</a>
            </nav>
            <button onclick="localStorage.clear(); location.reload();" class="text-slate-500 text-[10px] font-bold uppercase">Reset Session</button>
        </aside>

        <main class="flex-1 p-6 lg:p-10">
            <header class="flex justify-between items-center mb-10">
                <h2 id="userName" class="text-2xl font-black italic text-slate-400">Syncing Profile...</h2>
                <div class="bg-white px-6 py-3 rounded-[2rem] shadow-sm border border-slate-100 font-black" id="balance">₦0.00</div>
            </header>

            <div id="admin-banner" class="hidden mb-10 p-10 rounded-[3rem] bg-gradient-to-br from-slate-900 to-blue-950 text-white cursor-pointer" onclick="location.href='admin.html'">
                <h3 class="text-2xl font-black">System Master Access</h3>
                <p class="text-blue-400 text-sm">Tap here to manage products and users.</p>
            </div>

            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div class="h-48 bg-slate-200 rounded-[2rem] animate-pulse"></div>
                <div class="h-48 bg-slate-200 rounded-[2rem] animate-pulse"></div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>

    <script type="module">
        const SUPABASE_URL = 'https://qdoqkqzidpuchynuzkaz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkb3FrcXppZHB1Y2h5bnV6a2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODMyNzEsImV4cCI6MjA5MjA1OTI3MX0.NzXuTJd2384npxTNzdYGoNo9CcQDHqlwkUM-pV2xlV0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Emergency Timeout: If it takes more than 6 seconds, just show the page.
        const timeout = setTimeout(() => {
            console.warn("Forcing loader to close due to timeout.");
            closeLoader();
        }, 6000);

        function closeLoader() {
            clearTimeout(timeout);
            const ldr = document.getElementById('loader');
            ldr.style.opacity = '0';
            setTimeout(() => ldr.style.display = 'none', 500);
        }

        async function run() {
            document.getElementById('progress-bar').style.width = '60%';
            
            try {
                // 1. Check Session
                const { data: { session }, error: authErr } = await _supabase.auth.getSession();
                if(!session || authErr) { location.href = 'login.html'; return; }

                // 2. Load User & Products at once
                document.getElementById('loader-status').innerText = "Fetching Data...";
                const [pRes, gRes] = await Promise.all([
                    _supabase.from('profiles').select('*').eq('id', session.user.id).single(),
                    _supabase.from('products').select('*').eq('is_approved', true).limit(12)
                ]);

                if(pRes.data) {
                    const u = pRes.data;
                    document.getElementById('userName').innerText = `Hello, ${u.full_name}`;
                    document.getElementById('balance').innerText = `₦${u.wallet_balance.toLocaleString()}`;
                    document.getElementById('userName').classList.remove('text-slate-400');

                    if(u.role === 'admin') {
                        document.getElementById('side-admin').classList.remove('hidden');
                        document.getElementById('admin-banner').classList.remove('hidden');
                    }
                }

                if(gRes.data) {
                    document.getElementById('grid').innerHTML = gRes.data.map(i => `
                        <div class="bg-white p-3 rounded-[2rem] border shadow-sm hover:scale-105 transition-transform">
                            <img src="${i.image_url}" class="w-full h-32 object-cover rounded-[1.5rem] mb-2">
                            <p class="font-bold text-[10px] truncate px-2">${i.name}</p>
                            <p class="text-blue-600 font-black text-sm px-2">₦${i.price}</p>
                        </div>
                    `).join('');
                }

                document.getElementById('progress-bar').style.width = '100%';
                setTimeout(closeLoader, 500);

            } catch (e) {
                console.error("System Error:", e);
                document.getElementById('loader-status').innerText = "Connection Error. Retrying...";
            }
        }

        run();
    </script>
</body>
</html>
