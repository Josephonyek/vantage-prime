<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage | High Speed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] text-slate-900 overflow-x-hidden">

    <div id="loader" class="fixed inset-0 bg-[#0F172A] z-[999] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="relative flex items-center justify-center">
            <div class="absolute w-20 h-20 border-4 border-blue-500/20 rounded-full"></div>
            <div class="absolute w-20 h-20 border-4 border-t-blue-500 rounded-full animate-spin"></div>
            <h1 class="text-white font-black italic text-xl tracking-tighter">V</h1>
        </div>
        <div class="mt-8 overflow-hidden w-48 h-[2px] bg-slate-800 rounded-full">
            <div class="h-full bg-blue-500 animate-[loading_2s_ease-in-out_infinite]"></div>
        </div>
        <p class="mt-4 text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">Syncing Vantage OS</p>
    </div>

    <style>
        @keyframes loading {
            0% { width: 0%; margin-left: 0%; }
            50% { width: 100%; margin-left: 0%; }
            100% { width: 0%; margin-left: 100%; }
        }
    </style>

    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#0F172A] hidden lg:flex flex-col p-6 sticky top-0 h-screen text-white">
            <h1 class="text-xl font-black text-blue-500 mb-10">VANTAGE</h1>
            <nav class="space-y-1 flex-1">
                <a href="#" class="block p-4 rounded-2xl bg-blue-600 font-bold text-sm">Marketplace</a>
                <a href="admin.html" id="admin-nav" class="hidden p-4 rounded-2xl bg-red-500/10 text-red-400 border border-red-500/20 font-bold text-sm mt-4">Admin Panel</a>
            </nav>
            <button onclick="logout()" class="p-4 text-slate-500 text-xs font-bold uppercase">Sign Out</button>
        </aside>

        <main class="flex-1 p-4 lg:p-10">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="userName" class="text-2xl font-black italic">...</h2>
                    <span id="roleLabel" class="text-[10px] font-bold text-blue-600 uppercase">Verifying</span>
                </div>
                <div class="bg-white px-6 py-2 rounded-full shadow-sm border flex items-center gap-4">
                    <h3 id="wallet" class="text-lg font-black">₦0.00</h3>
                    <button onclick="document.getElementById('pay-modal').style.display='flex'" class="bg-blue-600 text-white w-8 h-8 rounded-full font-bold">+</button>
                </div>
            </header>

            <div id="admin-banner" class="hidden mb-10 p-8 rounded-[2.5rem] bg-slate-900 text-white flex justify-between items-center" onclick="location.href='admin.html'">
                <div>
                    <p class="text-blue-400 text-[10px] font-bold uppercase mb-1">System Control</p>
                    <h3 class="text-xl font-black">Open Admin Dashboard</h3>
                </div>
                <span class="text-2xl">⚡</span>
            </div>

            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="h-48 bg-slate-200 rounded-[2rem] animate-pulse"></div>
                <div class="h-48 bg-slate-200 rounded-[2rem] animate-pulse"></div>
                <div class="h-48 bg-slate-200 rounded-[2rem] animate-pulse"></div>
                <div class="h-48 bg-slate-200 rounded-[2rem] animate-pulse"></div>
            </div>
        </main>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-[999] items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center">
            <h3 class="text-xl font-black mb-4 text-slate-800">Add Funds</h3>
            <input type="number" id="amt" placeholder="₦ Amount" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 text-center font-bold">
            <button onclick="pay()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">Pay with Paystack</button>
            <button onclick="this.parentElement.parentElement.style.display='none'" class="mt-4 text-slate-400 text-xs">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>

    <script type="module">
        const SUPABASE_URL = 'https://qdoqkqzidpuchynuzkaz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkb3FrcXppZHB1Y2h5bnV6a2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODMyNzEsImV4cCI6MjA5MjA1OTI3MX0.NzXuTJd2384npxTNzdYGoNo9CcQDHqlwkUM-pV2xlV0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fastBoot() {
            // Check session immediately from local cache (Super fast)
            const { data: { session } } = await _supabase.auth.getSession();
            if(!session) { window.location.href = 'login.html'; return; }

            // Pull profile and products in one go
            const [pRes, gRes] = await Promise.all([
                _supabase.from('profiles').select('*').eq('id', session.user.id).single(),
                _supabase.from('products').select('*').eq('is_approved', true).limit(8)
            ]);

            const user = pRes.data;
            document.getElementById('userName').innerText = `Hello, ${user.full_name.split(' ')[0]}`;
            document.getElementById('roleLabel').innerText = user.role;
            document.getElementById('wallet').innerText = `₦${user.wallet_balance.toLocaleString()}`;

            if(user.role === 'admin') {
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('admin-banner').classList.remove('hidden');
            }

            // Grid Render
            document.getElementById('grid').innerHTML = gRes.data.map(i => `
                <div class="bg-white p-3 rounded-[2rem] border shadow-sm">
                    <img src="${i.image_url}" class="w-full h-28 object-cover rounded-2xl mb-2">
                    <h5 class="font-bold text-[10px] truncate px-1">${i.name}</h5>
                    <p class="text-blue-600 font-black text-sm px-1">₦${i.price}</p>
                </div>
            `).join('');

            // KILL LOADER
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 300);
        }

        window.pay = () => {
            const amount = document.getElementById('amt').value;
            const handler = PaystackPop.setup({
                key: 'pk_test_77e96f0549cd29e76ce2117f8adf00a5a96658ea',
                email: 'user@vantage.com', // Replace with user email
                amount: amount * 100,
                callback: () => location.reload()
            });
            handler.openIframe();
        };

        window.logout = () => { _supabase.auth.signOut(); location.href='login.html'; };

        fastBoot();
    </script>
</body>
    </html>
