<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage | Multi-Role Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r hidden lg:flex flex-col p-6 sticky top-0 h-screen">
            <h1 class="text-2xl font-black text-indigo-600 mb-10 italic">VANTAGE</h1>
            
            <nav class="space-y-4 flex-1">
                <button onclick="changeTab('home')" class="w-full text-left p-3 rounded-xl font-bold hover:bg-slate-100 flex items-center gap-3">🏠 Home</button>
                <button onclick="changeTab('gallery')" class="w-full text-left p-3 rounded-xl font-bold hover:bg-slate-100 flex items-center gap-3">🖼️ View Gallery</button>
                <button id="admin-settings-link" onclick="location.href='admin.html'" class="hidden w-full text-left p-3 rounded-xl font-bold text-red-500 hover:bg-red-50 flex items-center gap-3">⚙️ Admin Settings</button>
            </nav>

            <button onclick="logout()" class="p-3 text-slate-400 font-bold text-sm">Logout</button>
        </aside>

        <main class="flex-1 p-6">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="greet" class="text-3xl font-black">Connecting...</h2>
                    <p id="roleLabel" class="text-[10px] font-bold uppercase tracking-widest text-indigo-500"></p>
                </div>
                <div class="text-right bg-white p-4 rounded-3xl border shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400">AVAILABLE BALANCE</p>
                    <h3 id="balanceDisplay" class="text-xl font-black">₦0.00</h3>
                </div>
            </header>

            <div id="customer-ui" class="hidden space-y-6">
                <div class="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-indigo-100 relative overflow-hidden">
                    <h4 class="text-lg font-bold">Fund Your Account</h4>
                    <p class="text-sm opacity-80 mb-6">Top up to buy goods instantly.</p>
                    <button onclick="showFundModal()" class="bg-white text-indigo-600 px-8 py-3 rounded-2xl font-black text-sm">Top Up Now</button>
                </div>
            </div>

            <div id="seller-ui" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-6 rounded-[2rem] text-white">
                        <p class="text-xs opacity-50">Total Sales Value</p>
                        <h4 class="text-2xl font-black" id="seller-sales">₦0.00</h4>
                    </div>
                    <button onclick="location.href='upload.html'" class="bg-white border-2 border-dashed border-slate-200 p-6 rounded-[2rem] font-bold text-slate-400 hover:border-indigo-400 hover:text-indigo-600 transition-all">
                        + Upload New Goods
                    </button>
                </div>
            </div>

            <div id="gallery-ui" class="mt-10">
                <h3 class="text-xl font-black mb-6">Marketplace Gallery</h3>
                <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-6">
                    </div>
            </div>
        </main>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-black/50 backdrop-blur-md hidden items-center justify-center p-6 z-[100]">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-sm text-center">
            <h3 class="text-2xl font-black mb-2">Fund Wallet</h3>
            <p class="text-slate-400 text-sm mb-6">Enter amount to add via Paystack</p>
            <input type="number" id="pay-amount" placeholder="₦ 5,000" class="w-full p-4 bg-slate-50 border rounded-2xl mb-6 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-indigo-600">
            <button onclick="initPaystack()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">Confirm & Pay</button>
            <button onclick="closeModal()" class="mt-4 text-slate-400 text-xs font-bold uppercase">Cancel</button>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://qdoqkqzidpuchynuzkaz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkb3FrcXppZHB1Y2h5bnV6a2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODMyNzEsImV4cCI6MjA5MjA1OTI3MX0.NzXuTJd2384npxTNzdYGoNo9CcQDHqlwkUM-pV2xlV0';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function startDashboard() {
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) location.href = 'login.html';

            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            
            document.getElementById('greet').innerText = `Welcome, ${profile.full_name.split(' ')[0]}`;
            document.getElementById('roleLabel').innerText = profile.role + " Mode";
            document.getElementById('balanceDisplay').innerText = `₦${profile.wallet_balance.toLocaleString()}`;

            // Show UI based on Role
            if(profile.role === 'admin') {
                document.getElementById('admin-settings-link').classList.remove('hidden');
                document.getElementById('seller-ui').classList.remove('hidden'); // Admins can also see seller tools
            } else if(profile.role === 'seller') {
                document.getElementById('seller-ui').classList.remove('hidden');
            } else {
                document.getElementById('customer-ui').classList.remove('hidden');
            }

            loadProducts();
        }

        async function loadProducts() {
            const { data } = await _supabase.from('products').select('*, profiles(full_name, whatsapp_number)').eq('is_approved', true);
            const grid = document.getElementById('product-grid');
            grid.innerHTML = data.map(item => `
                <div class="bg-white border p-3 rounded-[2rem] shadow-sm">
                    <img src="${item.image_url}" class="w-full h-32 object-cover rounded-[1.5rem] mb-3">
                    <h5 class="font-bold text-sm truncate">${item.name}</h5>
                    <p class="text-indigo-600 font-black text-lg">₦${item.price}</p>
                    <button onclick="buyProduct('${item.name}', ${item.price}, '${item.profiles.whatsapp_number}')" class="w-full mt-2 bg-slate-900 text-white py-2 rounded-xl text-[10px] font-bold uppercase">View & Buy</button>
                </div>
            `).join('');
        }

        window.buyProduct = (name, price, phone) => {
            const pass = prompt(`Authorizing purchase for ${name} (₦${price}). Enter Password:`);
            if(pass) {
                alert("Security Verified. Payment Processing...");
                // Here is where the wallet subtraction happens
                window.open(`https://wa.me/${phone}?text=Hello, I just paid ₦${price} for ${name} on Vantage. Here is my address:`);
            }
        };

        window.showFundModal = () => document.getElementById('pay-modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('pay-modal').classList.add('hidden');

        startDashboard();
    </script>
</body>
    </html>
