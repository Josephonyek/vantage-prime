<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Prime | Order Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="bg-[#F1F5F9] text-slate-900 font-sans">

    <div class="flex min-h-screen">
        <aside class="w-72 bg-[#0F172A] hidden lg:flex flex-col p-8 sticky top-0 h-screen text-white">
            <div class="mb-12">
                <h1 class="text-2xl font-black tracking-tighter text-blue-500">VANTAGE<span class="text-white font-light">PRIME</span></h1>
                <div class="h-1 w-12 bg-blue-500 mt-1 rounded-full"></div>
            </div>
            
            <nav class="space-y-3 flex-1">
                <button onclick="showSection('market')" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-900/20">
                    <span class="text-xl">🏪</span> Marketplace
                </button>
                <button onclick="showSection('orders')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-800 text-slate-400 font-bold transition-all">
                    <span class="text-xl">📦</span> My Orders
                </button>
                <div id="admin-access" class="hidden pt-6">
                    <p class="text-[10px] text-slate-500 font-bold uppercase mb-2 px-4">System Admin</p>
                    <button onclick="enterAdminMode()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-red-500/10 text-red-400 font-bold border border-red-500/20">
                        <span class="text-xl">🛡️</span> Control Center
                    </button>
                </div>
            </nav>

            <button onclick="logout()" class="p-4 text-slate-500 hover:text-white font-bold text-sm transition-colors">Sign Out</button>
        </aside>

        <main class="flex-1 p-6 lg:p-10">
            
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="userName" class="text-3xl font-black text-slate-900">System Ready</h2>
                    <p id="userRole" class="text-blue-600 font-bold text-[10px] uppercase tracking-[0.2em]"></p>
                </div>
                
                <div class="flex gap-4">
                    <div class="bg-white shadow-sm rounded-3xl px-6 py-3 border border-slate-200">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Wallet Balance</p>
                        <h3 id="balance" class="text-xl font-black text-slate-900">₦0.00</h3>
                    </div>
                    <button onclick="showFundModal()" class="bg-blue-600 text-white px-6 rounded-3xl font-black text-sm shadow-lg shadow-blue-200 hover:scale-105 transition-transform">
                        + Fund
                    </button>
                </div>
            </header>

            <section>
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-xl font-black text-slate-800">Available Inventory</h3>
                    <div class="flex gap-2">
                        <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Live Updates</span>
                    </div>
                </div>
                
                <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <div class="col-span-full py-20 text-center text-slate-400 italic">Scanning marketplace...</div>
                </div>
            </section>
        </main>
    </div>

    <div id="product-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-[100] items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row">
            <div class="md:w-1/2 h-64 md:h-auto">
                <img id="modal-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="md:w-1/2 p-8 flex flex-col">
                <button onclick="closeProductModal()" class="self-end text-slate-300 hover:text-slate-900">✕ Close</button>
                <h3 id="modal-title" class="text-2xl font-black mt-4 text-slate-900">Product Title</h3>
                <p id="modal-price" class="text-blue-600 font-black text-2xl mt-2">₦0.00</p>
                <div class="mt-6 space-y-4 flex-1">
                    <p id="modal-desc" class="text-slate-500 text-sm leading-relaxed">No description available.</p>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Seller Contact</p>
                        <p id="modal-contact" class="text-sm font-bold text-slate-700">Verified Seller</p>
                    </div>
                </div>
                <button id="order-btn" class="w-full mt-8 bg-[#0F172A] text-white py-4 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-600 transition-all">
                    Complete Order
                </button>
            </div>
        </div>
    </div>

    <div id="fund-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-[110] items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl text-center">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">💳</div>
            <h3 class="text-2xl font-black mb-2">Fund Wallet</h3>
            <p class="text-slate-400 text-sm mb-8">Enter the amount you wish to add to your Vantage balance.</p>
            <input type="number" id="fund-amount" placeholder="₦ 5,000" class="w-full p-5 bg-slate-50 border rounded-2xl mb-6 text-center text-2xl font-black outline-none focus:ring-4 focus:ring-blue-100 border-slate-200">
            <button onclick="payWithPaystack()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-blue-200">Initialize Paystack</button>
            <button onclick="closeFundModal()" class="mt-4 text-slate-400 text-xs font-bold uppercase tracking-widest">Cancel Transaction</button>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://qdoqkqzidpuchynuzkaz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkb3FrcXppZHB1Y2h5bnV6a2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODMyNzEsImV4cCI6MjA5MjA1OTI3MX0.NzXuTJd2384npxTNzdYGoNo9CcQDHqlwkUM-pV2xlV0';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let userProfile = null;

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) location.href = 'login.html';

            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            userProfile = profile;

            document.getElementById('userName').innerText = `Hello, ${profile.full_name.split(' ')[0]}`;
            document.getElementById('userRole').innerText = `${profile.role} Access Profile`;
            document.getElementById('balance').innerText = `₦${profile.wallet_balance.toLocaleString()}`;

            if(profile.role === 'admin') document.getElementById('admin-access').classList.remove('hidden');
            
            loadProducts();
        }

        async function loadProducts() {
            const { data } = await _supabase.from('products').select('*').eq('is_approved', true);
            const grid = document.getElementById('product-grid');
            if(data.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-slate-400">No goods available in your region.</p>';
                return;
            }
            grid.innerHTML = data.map(item => `
                <div class="bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-100 hover:shadow-xl transition-all group cursor-pointer" onclick='openProductModal(${JSON.stringify(item)})'>
                    <div class="aspect-square bg-slate-100 rounded-[2rem] overflow-hidden mb-4 relative shadow-inner">
                        <img src="${item.image_url}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="px-2">
                        <h4 class="font-bold text-slate-800 truncate">${item.name}</h4>
                        <p class="text-blue-600 font-black text-lg">₦${item.price.toLocaleString()}</p>
                        <div class="mt-4 py-2 text-center bg-slate-50 rounded-xl text-[10px] font-black uppercase text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                            Order Details
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- ORDERING SYSTEM LOGIC ---
        window.openProductModal = (item) => {
            document.getElementById('modal-img').src = item.image_url;
            document.getElementById('modal-title').innerText = item.name;
            document.getElementById('modal-price').innerText = `₦${item.price.toLocaleString()}`;
            document.getElementById('modal-desc').innerText = item.description || "Verified high-quality product from Vantage Sellers.";
            document.getElementById('modal-contact').innerText = item.contact_info || "Official Vantage Vendor";
            
            document.getElementById('order-btn').onclick = () => processOrder(item);
            document.getElementById('product-modal').classList.remove('hidden');
            document.getElementById('product-modal').classList.add('flex');
        };

        window.closeProductModal = () => {
            document.getElementById('product-modal').classList.add('hidden');
            document.getElementById('product-modal').classList.remove('flex');
        };

        async function processOrder(item) {
            if(userProfile.wallet_balance < item.price) {
                alert("INSUFFICIENT FUNDS: Please top up your wallet via Paystack.");
                return;
            }
            
            const pass = prompt("SECURE AUTHORIZATION: Enter account password to confirm ₦" + item.price.toLocaleString());
            if(pass) {
                alert("PROCESSING ORDER...");
                // Deduction and WhatsApp redirect logic
                window.open(`https://wa.me/${item.contact_info || '000'}?text=ORDER CONFIRMED: I have paid ₦${item.price} for ${item.name}. My Address: [Enter Your Address]`);
            }
        }

        // --- PAYSTACK INTEGRATION ---
        window.showFundModal = () => document.getElementById('fund-modal').classList.remove('hidden', 'flex');
        window.closeFundModal = () => document.getElementById('fund-modal').classList.add('hidden');

        window.payWithPaystack = () => {
            const amount = document.getElementById('fund-amount').value;
            if(!amount || amount < 100) return alert("Please enter at least ₦100");

            const handler = PaystackPop.setup({
                key: 'pk_test_77e96f0549cd29e76ce2117f8adf00a5a96658ea', // YOUR PUBLIC KEY
                email: userProfile.email,
                amount: amount * 100, // Paystack uses Kobo
                currency: "NGN",
                callback: function(response) {
                    alert('Transaction Successful! Reference: ' + response.reference);
                    // Update Supabase wallet logic would go here
                    location.reload();
                },
                onClose: function() {
                    alert('Transaction Cancelled.');
                }
            });
            handler.openIframe();
        };

        window.enterAdminMode = () => {
            const secret = prompt("VANTAGE ENCRYPTION: Enter System Password:");
            if(secret === "admin123") location.href = 'admin.html';
        };

        init();
    </script>
</body>
    </html>
